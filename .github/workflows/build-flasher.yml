name: Build FunkFlash-ESP

on:
  push:
    branches: [main]
    paths:
      - 'flasher/**'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller esptool pyserial requests

      - name: Download latest firmware
        run: python flasher/fetch_firmware.py

      - name: Build EXE with PyInstaller
        run: |
          cd flasher
          pyinstaller ^
            --onefile ^
            --windowed ^
            --name FunkFlash-ESP ^
            --hidden-import esptool ^
            --hidden-import esptool.targets ^
            --hidden-import esptool.targets.esp32 ^
            --hidden-import esptool.loader ^
            --hidden-import esptool.cmds ^
            --hidden-import serial ^
            --hidden-import serial.tools ^
            --hidden-import serial.tools.list_ports ^
            --hidden-import serial.tools.list_ports_windows ^
            --collect-all esptool ^
            --add-data "firmware;firmware" ^
            main.py
        shell: cmd

      - name: List build output
        run: dir flasher\dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FunkFlash-ESP-Windows
          path: flasher/dist/FunkFlash-ESP.exe
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: flasher/dist/FunkFlash-ESP.exe

  # macOS and Linux builds — added once Windows is confirmed working
  # build-macos:
  #   ...
  # build-linux:
  #   ...
